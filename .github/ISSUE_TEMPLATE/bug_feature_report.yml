name: "🐛 Bug Report / Feature Request"
description: Report a broken demo, a data issue, or suggest a new demo or improvement.
title: "[Bug] <short description>"
labels: ["needs-triage"]
assignees: ["VinayaSharada"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue or suggest an improvement.
        Please fill in the relevant section below — skip sections that don't apply.

        > **Note:** If you are here to acknowledge your use of this repository,
        > please use the **📋 Usage Acknowledgment** template instead.

        ---

  - type: dropdown
    id: report_type
    attributes:
      label: Report Type
      options:
        - "🐛 Bug — a demo crashes or produces wrong output"
        - "📄 Data Issue — synthetic data is incorrect or unrealistic"
        - "📖 Documentation — README is missing, wrong, or unclear"
        - "✨ Feature Request — new demo or improvement idea"
        - "🔧 Compatibility — demo works on some environments but not others"
    validations:
      required: true

  - type: input
    id: affected_demo
    attributes:
      label: Affected Demo or File
      description: Which folder or file is this about?
      placeholder: "e.g. DomainUseCaseDemos/CreditCards/CCUnderWriting or 🤖 Browser-AI-Demos/3-privacy-notebook"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        For bugs: what went wrong? For feature requests: what would you like to see and why?
      placeholder: |
        Bug: Running intrusion_detection.py raises a KeyError on line 214 when the
        firewall.log is missing the SRC= field in some iptables entries.

        Feature: A demo showing transformer-based time series forecasting (e.g. PatchTST)
        would complement the existing LSTM forecasting demo nicely.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce (bugs only)
      description: Exact commands or actions that trigger the issue.
      placeholder: |
        1. cd DomainUseCaseDemos/CyberSecurity/ServerLogIntrusion
        2. pip install -r requirements.txt
        3. python intrusion_detection.py
        4. See error: KeyError: 'SRC'
    validations:
      required: false

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs Actual Behaviour (bugs only)
      placeholder: |
        Expected: Dashboard renders with 6 subplots and exits with code 0.
        Actual: Script crashes at the firewall log parsing step with KeyError.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, browser (for browser demos), relevant package versions.
      placeholder: |
        OS: Windows 11 / Ubuntu 22.04 / macOS 14
        Python: 3.11.4
        Browser (if applicable): Chrome 124 / Edge 123
        Key packages: pandas 2.1, matplotlib 3.8, scikit-learn 1.4
    validations:
      required: false

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested Fix or Implementation Notes (optional)
      description: If you already know how to fix it or have a rough design for the feature.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request for this fix or feature.
