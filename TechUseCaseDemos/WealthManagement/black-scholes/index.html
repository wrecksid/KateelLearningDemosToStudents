<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Scholes Options Pricer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="widget">
        <header>
            <h1>🧮 Black Scholes Calculator</h1>
            <p>Options pricing model</p>
        </header>
        
        <main>
            <div class="form-grid">
                <div class="input-group">
                    <label>Spot Price (S)</label>
                    <input type="number" id="spot" value="100" step="0.01">
                </div>
                <div class="input-group">
                    <label>Strike Price (K)</label>
                    <input type="number" id="strike" value="100" step="0.01">
                </div>
                <div class="input-group">
                    <label>Time to Expiry (T)</label>
                    <input type="number" id="time" value="0.5" step="0.01">
                </div>
                <div class="input-group">
                    <label>Risk-free Rate (r)</label>
                    <input type="number" id="rate" value="0.05" step="0.001">
                </div>
                <div class="input-group">
                    <label>Volatility (σ)</label>
                    <input type="number" id="vol" value="0.2" step="0.01">
                </div>
            </div>
            
            <button id="calculate-btn">Calculate</button>
            
            <div class="results">
                <div class="result-box">
                    <span>Call Price</span>
                    <span class="value" id="call-price">$10.45</span>
                </div>
                <div class="result-box">
                    <span>Put Price</span>
                    <span class="value" id="put-price">$5.57</span>
                </div>
                <div class="result-box">
                    <span>Delta (Call)</span>
                    <span class="value" id="delta-call">0.68</span>
                </div>
                <div class="result-box">
                    <span>Delta (Put)</span>
                    <span class="value" id="delta-put">-0.32</span>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Black Scholes Model | Options Pricing</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
