<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AI Resource Planner</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Resource Planner</h1>
      <p class="subtitle">Estimate compute resources and costs</p>
    </header>
    <main>
      <section class="input-section">
        <h2>Project Parameters</h2>
        <div class="grid">
          <div class="field">
            <label for="modelType">Model Type</label>
            <select id="modelType">
              <option value="small">Small (Tabular)</option>
              <option value="medium">Medium (NLP/CV)</option>
              <option value="large">Large (LLM)</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="field">
            <label for="inferenceVolume">Daily Inference Volume</label>
            <input type="number" id="inferenceVolume" value="1000" min="1"/>
          </div>
          <div class="field">
            <label for="latency">Target Latency (ms)</label>
            <input type="number" id="latency" value="100" min="1"/>
          </div>
          <div class="field">
            <label for="duration">Usage Duration (months)</label>
            <input type="number" id="duration" value="12" min="1"/>
          </div>
        </div>
      </section>
      <section class="results-section">
        <h2>Resource Estimation</h2>
        <div class="results-grid">
          <div class="result-card">
            <h3>Compute</h3>
            <p id="compute">-</p>
          </div>
          <div class="result-card">
            <h3>Memory</h3>
            <p id="memory">-</p>
          </div>
          <div class="result-card">
            <h3>Storage</h3>
            <p id="storage">-</p>
          </div>
          <div class="result-card">
            <h3>Monthly Cost</h3>
            <p id="monthlyCost">-</p>
          </div>
          <div class="result-card">
            <h3>Total Cost</h3>
            <p id="totalCost">-</p>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
