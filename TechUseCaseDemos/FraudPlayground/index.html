<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fraud Detection Playground - Finance AI Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>🛡️ Fraud Detection Playground</h1>
      <p class="subtitle">Anomaly Detection Demo</p>
    </header>

    <main>
      <!-- Controls -->
      <section class="controls-section">
        <div class="control-group">
          <label>Transactions: <span id="txn-count">1000</span></label>
          <input type="range" id="txn-count-input" min="100" max="5000" value="1000">
        </div>
        <div class="control-group">
          <label>Fraud Rate: <span id="fraud-rate">2%</span></label>
          <input type="range" id="fraud-rate-input" min="0.1" max="10" value="2" step="0.1">
        </div>
        <div class="control-group">
          <label>Detection Threshold: <span id="threshold-value">0.5</span></label>
          <input type="range" id="threshold-input" min="0" max="1" value="0.5" step="0.05">
        </div>
        <button id="run-btn" class="primary-btn">Run Detection</button>
      </section>

      <!-- Results -->
      <section class="results-section">
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-value" id="precision">85%</div>
            <div class="metric-label">Precision</div>
          </div>
          <div class="metric-card">
            <div class="metric-value" id="recall">78%</div>
            <div class="metric-label">Recall</div>
          </div>
          <div class="metric-card">
            <div class="metric-value" id="f1-score">81%</div>
            <div class="metric-label">F1-Score</div>
          </div>
          <div class="metric-card">
            <div class="metric-value" id="fraud-found">42</div>
            <div class="metric-label">Frauds Found</div>
          </div>
        </div>
      </section>

      <!-- Visualization -->
      <section class="viz-section">
        <h2>Transaction Scatter Plot</h2>
        <div class="chart-container">
          <canvas id="scatter-chart" width="600" height="400"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
