<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feature Store Demo - ML Infrastructure</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>🏪 Feature Store</h1>
      <p class="subtitle">Central Feature Registry</p>
    </header>

    <main>
      <!-- Search & Filter -->
      <section class="controls-section">
        <input type="text" id="search-input" placeholder="Search features..." class="search-input">
        <div class="filter-tags">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="customer">Customer</button>
          <button class="filter-btn" data-filter="transaction">Transaction</button>
          <button class="filter-btn" data-filter="risk">Risk</button>
        </div>
      </section>

      <!-- Feature Catalog -->
      <section class="catalog-section">
        <h2>Feature Catalog</h2>
        <div id="feature-list" class="feature-list"></div>
      </section>
    </main>

    <!-- Feature Detail Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <span class="close" onclick="app.closeModal()">&times;</span>
        <h2 id="modal-title"></h2>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
