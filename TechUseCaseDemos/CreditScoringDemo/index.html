<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Credit Scoring Dashboard - Finance AI Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>💳 Credit Scoring Dashboard</h1>
      <p class="subtitle">AI-Powered Credit Decisioning Demo</p>
    </header>

    <main>
      <!-- Applicant Profile -->
      <section class="profile-section">
        <h2>Applicant Profile</h2>
        <div class="input-grid">
          <div class="input-group">
            <label>Annual Income: $<span id="income-value">50000</span></label>
            <input type="range" id="income" min="20000" max="200000" value="50000" step="1000">
          </div>
          <div class="input-group">
            <label>Existing Debt: $<span id="debt-value">15000</span></label>
            <input type="range" id="debt" min="0" max="100000" value="15000" step="500">
          </div>
          <div class="input-group">
            <label>Credit History (years): <span id="history-value">5</span></label>
            <input type="range" id="history" min="0" max="30" value="5">
          </div>
          <div class="input-group">
            <label>Existing Credit Cards: <span id="cards-value">2</span></label>
            <input type="range" id="cards" min="0" max="10" value="2">
          </div>
        </div>
      </section>

      <!-- Score Result -->
      <section class="score-section">
        <div class="score-card">
          <div class="score-circle" id="score-circle">
            <span class="score-value" id="score-value">350</span>
          </div>
          <div class="score-info">
            <h3>Credit Score: <span id="score-display">350</span></h3>
            <p class="decision" id="decision">Review Required</p>
            <p class="risk-level" id="risk-level">Medium Risk</p>
          </div>
        </div>
      </section>

      <!-- Feature Contribution -->
      <section class="feature-section">
        <h2>Feature Contribution</h2>
        <div id="feature-chart" class="feature-chart"></div>
      </section>

      <!-- Scorecard -->
      <section class="scorecard-section">
        <h2>Points Breakdown</h2>
        <div id="points-breakdown" class="points-breakdown"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
