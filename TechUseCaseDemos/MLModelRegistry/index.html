<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ML Model Registry</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>ML Model Registry</h1>
      <p class="subtitle">Version and track machine learning models</p>
    </header>
    <main>
      <section class="form-section">
        <h2>Register New Model</h2>
        <form id="modelForm">
          <div class="grid">
            <div class="field">
              <label for="name">Model Name</label>
              <input type="text" id="name" required/>
            </div>
            <div class="field">
              <label for="version">Version</label>
              <input type="text" id="version" placeholder="1.0.0" required/>
            </div>
          </div>
          <div class="grid">
            <div class="field">
              <label for="framework">Framework</label>
              <select id="framework">
                <option>TensorFlow</option>
                <option>PyTorch</option>
                <option>Scikit-learn</option>
                <option>XGBoost</option>
              </select>
            </div>
            <div class="field">
              <label for="accuracy">Accuracy (%)</label>
              <input type="number" id="accuracy" min="0" max="100" step="0.1" value="95.0"/>
            </div>
          </div>
          <button type="submit">Register Model</button>
        </form>
      </section>
      <section class="registry-section">
        <h2>Model Registry</h2>
        <div id="registry"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
