<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Counter Party Risk - Credit Risk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>🏦 Counter Party Risk</h1>
      <p class="subtitle">Credit Valuation Adjustment (CVA) Demo</p>
    </header>

    <main>
      <!-- Counterparty Details -->
      <section class="cp-details">
        <h2>Counterparty Profile</h2>
        <div class="input-grid">
          <div class="input-group">
            <label>Credit Rating: <span id="rating-val">BBB</span></label>
            <select id="credit-rating">
              <option value="AAA">AAA</option>
              <option value="AA">AA</option>
              <option value="A">A</option>
              <option value="BBB" selected>BBB</option>
              <option value="BB">BB</option>
              <option value="B">B</option>
              <option value="CCC">CCC</option>
            </select>
          </div>
          <div class="input-group">
            <label>Exposure Notional: $<span id="notional-val">10M</span></label>
            <input type="range" id="notional" min="1" max="100" value="10">
          </div>
          <div class="input-group">
            <label>Maturity: <span id="maturity-val">2</span> years</label>
            <input type="range" id="maturity" min="1" max="10" value="2">
          </div>
          <div class="input-group">
            <label>Collateral: <span id="collateral-val">50%</span></label>
            <input type="range" id="collateral" min="0" max="90" value="50">
          </div>
        </div>
      </section>

      <!-- CVA Results -->
      <section class="results-section">
        <h2>CVA Calculation</h2>
        <div class="results-grid">
          <div class="result-card">
            <div class="result-value" id="pd">1.2%</div>
            <div class="result-label">Implied PD</div>
          </div>
          <div class="result-card">
            <div class="result-value" id="lgd">45%</div>
            <div class="result-label">LGD</div>
          </div>
          <div class="result-card">
            <div class="result-value" id="exposure">$5.2M</div>
            <div class="result-label">Avg Exposure</div>
          </div>
          <div class="result-card">
            <div class="result-value" id="cva">$277K</div>
            <div class="result-label">CVA (Cost)</div>
          </div>
        </div>
      </section>

      <!-- Mitigation -->
      <section class="mitigation-section">
        <h2>Risk Mitigation</h2>
        <div class="mitigation-grid">
          <div class="mitigation-item">
            <span>Mortgage = CVA</span>
            <span id="mortgage">$277K</span>
          </div>
          <div class="mitigation-item">
            <span>Collateral Impact</span>
            <span id="collateral-impact">-$139K</span>
          </div>
          <div class="mitigation-item">
            <span>Net CVA</span>
            <span id="net-cva">$139K</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
